name: Daily News Briefing

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행도 허용

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 최근 실행들의 수집·분류 스냅샷(*_snapshot.json)을 백업 아티팩트에서 복원.
      # 두 용도로 쓰인다:
      #   (1) 재실행 재개: 같은 대상 날짜 스냅샷이 있으면 main.py가 수집·분류를
      #       건너뛰고 동일 표본으로 분석부터 재개(늦은 재실행의 표본 드리프트 방지,
      #       2026-06-11 관찰: 재실행에서 314건→127건).
      #   (2) 전일 대비 데이터 프로필: 전일(대상날짜-1) 스냅샷이 있으면 분야·키워드
      #       증감을 프롬프트에 병기.
      # 두 스냅샷은 서로 다른 실행 아티팩트에 있으므로, 첫 성공에서 멈추지 않고
      # 최근 몇 개를 스캔해 누적한다(날짜명 파일이라 덮어쓰기 충돌 없음).
      # main.py는 필요한 날짜 스냅샷만 골라 쓰고 나머지는 무시한다.
      - name: Restore snapshots from recent runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p backups
          collected=0
          for id in $(gh run list --workflow daily.yml --limit 6 --json databaseId --jq '.[].databaseId'); do
            [ "$id" = "${{ github.run_id }}" ] && continue
            if timeout 30 gh run download "$id" --name "backups-$id" --dir /tmp/prev_backup 2>/dev/null; then
              if cp /tmp/prev_backup/*_snapshot.json backups/ 2>/dev/null; then
                echo "스냅샷 복원: run $id"
                collected=$((collected + 1))
              else
                echo "run $id 아티팩트에 스냅샷 없음"
              fi
              rm -rf /tmp/prev_backup
            fi
            # 재개용 + 전일용 2개 확보하면 충분 (시간 절약)
            [ "$collected" -ge 2 ] && break
          done
          ls backups/ 2>/dev/null || true

      - name: Run daily briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        # 종료코드 분기: 1(수집 0건)은 준일상 실패라 green 유지,
        # 2(분석 실패)·3(업로드 실패)은 red로 표시해 실패를 알림.
        # 백업 업로드는 다음 스텝의 if: always()가 보장하므로
        # continue-on-error는 쓰지 않는다 (실패 은폐 부작용만 있음).
        run: |
          set +e
          python main.py
          code=$?
          echo "main.py exit code: $code"
          if [ "$code" -ge 2 ]; then exit "$code"; fi
          exit 0

      - name: Upload backups artifact
        if: always()  # 성공/실패 무관하게 백업 업로드
        uses: actions/upload-artifact@v6
        with:
          name: backups-${{ github.run_id }}
          path: backups/
          if-no-files-found: ignore
          retention-days: 30